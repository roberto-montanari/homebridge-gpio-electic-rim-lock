name: Publish Homebridge Plugin

# Trigger manuale
on:
  workflow_dispatch:  # permette di avviare il workflow dal sito GitHub

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout del repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      # 3️⃣ Installa le dipendenze
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Compila il plugin (opzionale)
      - name: Build plugin
        run: npm run build --if-present

      # 5️⃣ Pubblica su npm
      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # 6️⃣ Mostra la versione pubblicata
      - name: Log published version
        run: npm view $(jq -r .name package.json) version
